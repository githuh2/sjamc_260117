<html lang="ko">
<head>
    <meta charset="UTF-8">

    <meta property="og:title" content="건강 노트 — SY 동물의료센터">
    <meta property="og:description" content="진료실에서 자주 듣는 질문, 계절별 주의사항, 예방 케어 가이드.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1629909613654-28e377c37b09?auto=format&fit=crop&w=1200&h=630&q=80">
    <meta property="og:url" content="https://huhsungyup.com/post.html">
    <meta property="og:locale" content="ko_KR">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap">
    <style>
        :root {
            --ink: #0e0f0a;
            --cream: #f5f3ec;
            --paper: #fff;
            --text: #15160f;
            --muted: #75736a;
            --border: #dcd7c8;
            --border-ink: rgba(255,255,255,0.10);
            --accent: #8a4a2c;
            --ease: cubic-bezier(0.22, 1, 0.36, 1);
            --font: 'Pretendard', system-ui, -apple-system, 'Segoe UI', sans-serif;
            --mono: 'JetBrains Mono', ui-monospace, monospace;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            background: var(--cream); color: var(--text);
            font-family: var(--font); font-size: 17px; line-height: 1.75;
            -webkit-font-smoothing: antialiased; word-break: keep-all;
        }
        a { color: inherit; text-decoration: none; }
        h1, h2, h3, h4, p, ul, dl, dd { margin: 0; padding: 0; }
        ul { list-style: none; }
        img { display: block; max-width: 100%; }

        /* ─── 헤더 (index.html과 동일, 항상 cream 솔리드) ───── */
        header {
            position: fixed; inset: 0 0 auto 0;
            z-index: 100;
            background: rgba(245, 243, 236, 0.92);
            backdrop-filter: saturate(180%) blur(12px);
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }
        .nav {
            max-width: 1180px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 28px;
        }
        .brand { display: flex; align-items: baseline; gap: 10px; }
        .brand-mark {
            font-weight: 800; font-size: 17px; letter-spacing: -0.01em;
            color: inherit;
        }
        .brand-sub {
            font-family: var(--mono); font-size: 10px; font-weight: 500;
            color: var(--muted);
            letter-spacing: 0.14em; text-transform: uppercase;
        }
        .nav-menu {
            display: flex; gap: 32px; font-size: 14px; font-weight: 500;
        }
        .nav-menu a { color: var(--text); transition: color 0.2s; }
        .nav-menu a:hover { color: var(--accent); }

        /* ─── 본문 ─────────────────────────────────────────── */
        article {
            max-width: 720px; margin: 0 auto;
            padding: 140px 28px 100px;
        }
        .post-meta {
            font-family: var(--mono); font-size: 11px; font-weight: 700;
            color: var(--accent); letter-spacing: 0.18em; text-transform: uppercase;
            margin-bottom: 18px;
        }
        .post-title {
            font-size: clamp(28px, 4vw, 44px);
            font-weight: 800; letter-spacing: -0.02em; line-height: 1.2;
            margin: 0 0 40px;
            padding-bottom: 36px;
            border-bottom: 1px solid var(--border);
        }
        .post-content { font-size: 17px; }
        .post-content h1 { display: none; }
        .post-content h2 {
            font-size: 24px; font-weight: 800;
            letter-spacing: -0.015em;
            margin: 56px 0 18px;
        }
        .post-content h3 {
            font-size: 18px; font-weight: 700;
            margin: 36px 0 14px;
        }
        .post-content p { margin: 0 0 22px; color: var(--text); }
        .post-content ul, .post-content ol { margin: 0 0 22px; padding-left: 24px; }
        .post-content li { margin-bottom: 8px; }
        .post-content strong { font-weight: 700; }
        .post-content em { font-style: italic; }
        .post-content code {
            font-family: var(--mono); font-size: 0.92em;
            background: rgba(0,0,0,0.05); padding: 2px 6px; border-radius: 3px;
        }
        .post-content blockquote {
            margin: 32px 0;
            padding: 4px 0 4px 22px;
            border-left: 2px solid var(--accent);
            color: var(--text);
            font-size: 18px;
            line-height: 1.7;
        }
        .post-content blockquote p { margin-bottom: 0; }
        .post-content hr {
            border: 0; border-top: 1px solid var(--border);
            margin: 48px 0;
        }
        .post-content table {
            width: 100%; border-collapse: collapse;
            margin: 24px 0; font-size: 14.5px;
        }
        .post-content th, .post-content td {
            text-align: left; padding: 12px 14px;
            border-bottom: 1px solid var(--border);
        }
        .post-content th {
            font-weight: 700;
            border-bottom: 2px solid var(--ink);
            font-family: var(--mono); font-size: 12px;
            letter-spacing: 0.05em; text-transform: uppercase;
            color: var(--muted);
        }
        .post-content img {
            display: block; max-width: 100%; height: auto;
            margin: 32px 0; border: 1px solid var(--border);
        }
        .post-content a {
            color: var(--accent);
            border-bottom: 1px solid currentColor;
        }

        .post-end {
            margin-top: 80px; padding-top: 36px;
            border-top: 1px solid var(--border);
            font-family: var(--mono); font-size: 11px; font-weight: 700;
            color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase;
        }
        .back-row {
            max-width: 720px; margin: 0 auto;
            padding: 0 28px 80px;
        }
        .back-row a {
            display: inline-flex; align-items: center; gap: 8px;
            font-family: var(--mono); font-size: 11px; font-weight: 700;
            color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase;
            transition: color 0.2s;
        }
        .back-row a:hover { color: var(--accent); }
        .loading { color: var(--muted); padding: 40px 0; }

        /* ─── 푸터 (index.html과 동일) ─────────────────────── */
        footer {
            background: var(--ink);
            color: rgba(245,243,236,0.55);
            padding: 60px 0 40px;
            border-top: 1px solid var(--border-ink);
            font-size: 13px;
        }
        .wrap { max-width: 1180px; margin: 0 auto; padding: 0 28px; }
        .footer-inner {
            display: flex; justify-content: space-between; align-items: flex-end;
            gap: 40px;
            flex-wrap: wrap;
        }
        .footer-brand {
            font-weight: 800; font-size: 18px; color: var(--cream);
            margin-bottom: 8px;
        }

        @media (max-width: 880px) {
            .nav-menu { display: none; }
            article { padding: 110px 22px 80px; }
            .back-row { padding: 0 22px 60px; }
            .post-content { font-size: 16px; }
        }
    </style>
</head>
<body>

<header id="site-header">
    <div class="nav">
        <a href="index.html" class="brand">
            <span class="brand-mark">SY 동물의료센터</span>
            <span class="brand-sub">SY Animal Medical Center</span>
        </a>
        <nav class="nav-menu">
            <a href="index.html#about">소개</a>
            <a href="index.html#services">진료</a>
            <a href="index.html#blog">건강 노트</a>
            <a href="index.html#info">진료시간 · 오시는 길</a>
        </nav>
    </div>
</header>

<article>
    <div id="post" class="loading">불러오는 중…</div>
</article>

<div class="back-row">
    <a href="index.html#blog">← 건강 노트 목록</a>
</div>

<footer>
    <div class="wrap footer-inner">
        <div>
            <div class="footer-brand">SY 동물의료센터</div>
            <div>대표자: 허성엽 · 사업자등록번호 000-00-00000</div>
        </div>
        <div>© 2026 SY Animal Medical Center.</div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(async function () {
    const post = document.getElementById('post');
    const file = new URLSearchParams(location.search).get('file');
    if (!file || !/^[\w\-.가-힣]+\.md$/.test(file)) {
        post.innerHTML = '<p class="loading">잘못된 경로입니다.</p>';
        return;
    }
    try {
        const res = await fetch(`posts/${encodeURIComponent(file)}`);
        if (!res.ok) throw new Error();
        const raw = await res.text();
        const fmMatch = raw.match(/^---\n([\s\S]*?)\n---\n?/);
        let body = raw, meta = {};
        if (fmMatch) {
            body = raw.slice(fmMatch[0].length);
            fmMatch[1].split('\n').forEach(line => {
                const idx = line.indexOf(':');
                if (idx > 0) meta[line.slice(0, idx).trim()] = line.slice(idx + 1).trim();
            });
        }
        if (meta.title) document.title = `${meta.title} — SY 동물의료센터`;

        const renderer = new marked.Renderer();
        const origImage = renderer.image.bind(renderer);
        renderer.image = function (href, title, text) {
            const h = (typeof href === 'object' && href.href) ? href.href : href;
            if (h && !/^(https?:|\/|data:)/.test(h)) {
                const newHref = `posts/${h}`;
                return origImage(newHref, title, text);
            }
            return origImage(href, title, text);
        };
        marked.use({ renderer, gfm: true, breaks: false });

        post.classList.remove('loading');
        post.innerHTML = `
            ${meta.date ? `<div class="post-meta">${meta.date}</div>` : ''}
            ${meta.title ? `<h1 class="post-title">${meta.title}</h1>` : ''}
            <div class="post-content">${marked.parse(body)}</div>
            <div class="post-end">SY 동물의료센터 · 허성엽 대표원장</div>
        `;
    } catch (e) {
        post.innerHTML = '<p class="loading">글을 불러오지 못했습니다.</p>';
    }
})();
</script>

</body>
</html>
