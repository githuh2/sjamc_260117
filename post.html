<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>건강 노트 — SJ 동물의료센터</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap">
    <style>
        :root {
            --ink: #0e0f0a; --cream: #f5f3ec; --paper: #fff;
            --text: #15160f; --muted: #75736a;
            --border: #dcd7c8; --accent: #8a4a2c;
            --font: 'Pretendard', system-ui, sans-serif;
            --mono: 'JetBrains Mono', ui-monospace, monospace;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            background: var(--cream); color: var(--text);
            font-family: var(--font); font-size: 17px; line-height: 1.75;
            -webkit-font-smoothing: antialiased; word-break: keep-all;
        }
        a { color: inherit; text-decoration: none; }

        header {
            position: sticky; top: 0; z-index: 10;
            background: rgba(245,243,236,0.92);
            backdrop-filter: saturate(180%) blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .nav {
            max-width: 760px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 28px;
        }
        .brand { font-weight: 800; font-size: 15px; letter-spacing: -0.01em; }
        .back {
            font-family: var(--mono); font-size: 11px; font-weight: 700;
            color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase;
            transition: color 0.2s;
        }
        .back:hover { color: var(--accent); }

        article {
            max-width: 720px; margin: 0 auto;
            padding: 80px 28px 120px;
        }
        .post-meta {
            font-family: var(--mono); font-size: 11px; font-weight: 700;
            color: var(--accent); letter-spacing: 0.18em; text-transform: uppercase;
            margin-bottom: 18px;
        }
        .post-title {
            font-size: clamp(28px, 4vw, 44px);
            font-weight: 800; letter-spacing: -0.02em; line-height: 1.2;
            margin: 0 0 40px;
            padding-bottom: 36px;
            border-bottom: 1px solid var(--border);
        }
        .post-content { font-size: 17px; }
        .post-content h1 { display: none; }
        .post-content h2 {
            font-size: 24px; font-weight: 800;
            letter-spacing: -0.015em;
            margin: 56px 0 18px;
        }
        .post-content h3 {
            font-size: 18px; font-weight: 700;
            margin: 36px 0 14px;
        }
        .post-content p { margin: 0 0 22px; color: var(--text); }
        .post-content ul, .post-content ol { margin: 0 0 22px; padding-left: 24px; }
        .post-content li { margin-bottom: 8px; }
        .post-content strong { font-weight: 700; }
        .post-content em { font-style: italic; }
        .post-content code {
            font-family: var(--mono); font-size: 0.92em;
            background: rgba(0,0,0,0.05); padding: 2px 6px; border-radius: 3px;
        }
        .post-content blockquote {
            margin: 32px 0;
            padding: 4px 0 4px 22px;
            border-left: 2px solid var(--accent);
            color: var(--text);
            font-size: 18px;
            line-height: 1.7;
        }
        .post-content blockquote p { margin-bottom: 0; }
        .post-content hr {
            border: 0; border-top: 1px solid var(--border);
            margin: 48px 0;
        }
        .post-content table {
            width: 100%; border-collapse: collapse;
            margin: 24px 0; font-size: 14.5px;
        }
        .post-content th, .post-content td {
            text-align: left; padding: 12px 14px;
            border-bottom: 1px solid var(--border);
        }
        .post-content th {
            font-weight: 700;
            border-bottom: 2px solid var(--ink);
            font-family: var(--mono); font-size: 12px;
            letter-spacing: 0.05em; text-transform: uppercase;
            color: var(--muted);
        }
        .post-content img {
            display: block; max-width: 100%; height: auto;
            margin: 32px 0; border: 1px solid var(--border);
        }
        .post-content a {
            color: var(--accent);
            border-bottom: 1px solid currentColor;
        }

        .post-end {
            margin-top: 80px; padding-top: 36px;
            border-top: 1px solid var(--border);
            font-family: var(--mono); font-size: 11px; font-weight: 700;
            color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase;
        }
        .loading { color: var(--muted); padding: 40px 0; }

        @media (max-width: 640px) {
            article { padding: 56px 22px 80px; }
            .nav { padding: 14px 22px; }
            .post-content { font-size: 16px; }
        }
    </style>
</head>
<body>

<header>
    <div class="nav">
        <a href="index.html" class="brand">SJ 동물의료센터</a>
        <a href="index.html#blog" class="back">← 목록으로</a>
    </div>
</header>

<article>
    <div id="post" class="loading">불러오는 중…</div>
</article>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(async function () {
    const post = document.getElementById('post');
    const file = new URLSearchParams(location.search).get('file');
    if (!file || !/^[\w\-.가-힣]+\.md$/.test(file)) {
        post.innerHTML = '<p class="loading">잘못된 경로입니다.</p>';
        return;
    }
    try {
        const res = await fetch(`posts/${encodeURIComponent(file)}`);
        if (!res.ok) throw new Error();
        const raw = await res.text();
        const fmMatch = raw.match(/^---\n([\s\S]*?)\n---\n?/);
        let body = raw, meta = {};
        if (fmMatch) {
            body = raw.slice(fmMatch[0].length);
            fmMatch[1].split('\n').forEach(line => {
                const idx = line.indexOf(':');
                if (idx > 0) meta[line.slice(0, idx).trim()] = line.slice(idx + 1).trim();
            });
        }
        if (meta.title) document.title = `${meta.title} — SJ 동물의료센터`;

        // Custom renderer: prepend 'posts/' to relative image paths
        const renderer = new marked.Renderer();
        const origImage = renderer.image.bind(renderer);
        renderer.image = function (href, title, text) {
            const h = (typeof href === 'object' && href.href) ? href.href : href;
            if (h && !/^(https?:|\/|data:)/.test(h)) {
                const newHref = `posts/${h}`;
                return origImage(newHref, title, text);
            }
            return origImage(href, title, text);
        };
        marked.use({ renderer, gfm: true, breaks: false });

        post.classList.remove('loading');
        post.innerHTML = `
            ${meta.date ? `<div class="post-meta">${meta.date}</div>` : ''}
            ${meta.title ? `<h1 class="post-title">${meta.title}</h1>` : ''}
            <div class="post-content">${marked.parse(body)}</div>
            <div class="post-end">SJ 동물의료센터 · 허성엽 대표원장</div>
        `;
    } catch (e) {
        post.innerHTML = '<p class="loading">글을 불러오지 못했습니다.</p>';
    }
})();
</script>

</body>
</html>
